name: CI

on:
  push:
    branches: [main]
    tags: ['deploy', 'nuget', 'npm', 'npm-wire', 'pypi']

permissions:
  contents: read
  packages: write

concurrency:
  # A push to main and the `deploy` tag move land the SAME commit, firing two
  # redundant CI runs. Group both by commit so the `deploy` run cancels the
  # `main` run (deploy runs everything main does, plus the deploy job). Other
  # refs (nuget/npm/npm-wire/pypi tags) keep their per-ref+sha group and still cancel
  # their own stale runs.
  group: ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/tags/deploy') && format('ci-commit-{0}', github.sha) || format('ci-{0}-{1}', github.ref_name, github.sha) }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # Correctness gate. Runs in PARALLEL with `publish` (image build) — `deploy` needs
  # both — so tests and the image build no longer run back-to-back. The image build
  # may still push even if tests fail (harmless: `deploy` is gated on this job).
  # Skipped on the package-publish tags (nuget/npm/npm-wire/pypi), which carry no app change.
  test:
    if: github.event_name == 'push' && github.ref != 'refs/tags/nuget' && github.ref != 'refs/tags/npm' && github.ref != 'refs/tags/npm-wire' && github.ref != 'refs/tags/pypi'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props', 'global.json') }}
          restore-keys: nuget-${{ runner.os }}-

      # Caches the compiled build.cs + Cake.Sdk source-generator output — the Cake file-based
      # app's runfile build dir, ~27s of uncached bootstrap per job before build.sh does
      # anything. The dir is content-addressed (same hash appeared in both jobs of run
      # 29185482723), so no restore-keys: a stale prefix match would just be a DIFFERENT
      # build.cs's output.
      - name: Cache Cake runfile build dir
        uses: actions/cache@v4
        with:
          path: ~/.local/share/dotnet/runfile
          key: cake-runfile-${{ runner.os }}-${{ hashFiles('build.cs', 'global.json', '.config/dotnet-tools.json') }}

      # Cache the chromium binary Playwright downloads for the E2E suite so it isn't
      # re-fetched every run. The hosted runner already has Chrome's shared libs, so
      # the build skips `--with-deps` (the slow apt-get) via --playwrightWithDeps=false.
      # Key on the Microsoft.Playwright VERSION, not the whole packages file — any
      # unrelated package bump used to rotate the key and re-download chromium.
      - name: Resolve Playwright version
        id: playwright-version
        run: echo "version=$(grep -oP '(?<=Include="Microsoft.Playwright" Version=")[^"]+' Directory.Packages.props)" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Ensure build script is executable
        run: chmod +x ./build.sh

      # ONE target, not a hand-assembled list of steps: `Test` (build.cs) is the single
      # definition of what "the code is OK" means — format + build + unit + E2E, and whatever
      # else we add there tomorrow. It is also the target the dev loop runs, so CI cannot be
      # stricter than the local run: that gap is what let a green local branch fail the deploy
      # tag run on whitespace.
      # Not --target=Verify: that also runs the TS/Python SDK checks, which have their own
      # `sdk` job below (bun + uv toolchains, in parallel with this one).
      - name: Cake Test target (format + build + unit + E2E)
        run: ./build.sh --target=Test --playwrightWithDeps=false

  # Client-SDK gate. The TS and Python SDKs are published to public registries (npm/PyPI) on
  # their own tags; until this job existed NOTHING checked them in CI — the targets were only
  # reachable via `Verify`, which no workflow called. Its own job (not a step in `test`) so the
  # bun/uv toolchains and the SDK checks run in PARALLEL with the .NET suite.
  sdk:
    if: github.event_name == 'push' && github.ref != 'refs/tags/nuget' && github.ref != 'refs/tags/npm' && github.ref != 'refs/tags/npm-wire' && github.ref != 'refs/tags/pypi'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # dotnet is here only to run build.sh (the Cake script) — the checks themselves are bun/uv.
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: astral-sh/setup-uv@v5

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props', 'global.json') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Cache Cake runfile build dir
        uses: actions/cache@v4
        with:
          path: ~/.local/share/dotnet/runfile
          key: cake-runfile-${{ runner.os }}-${{ hashFiles('build.cs', 'global.json', '.config/dotnet-tools.json') }}

      - name: Ensure build script is executable
        run: chmod +x ./build.sh

      - name: Cake SdkChecks target (TS + Python SDK lint/typecheck/test)
        run: ./build.sh --target=SdkChecks

  publish:
    if: github.event_name == 'push' && github.ref != 'refs/tags/nuget' && github.ref != 'refs/tags/npm' && github.ref != 'refs/tags/npm-wire' && github.ref != 'refs/tags/pypi'
    runs-on: ubuntu-latest
    outputs:
      dockerTag: ${{ steps.publish.outputs.dockerTag }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props', 'global.json') }}
          restore-keys: nuget-${{ runner.os }}-

      # Caches the compiled build.cs + Cake.Sdk source-generator output — the Cake file-based
      # app's runfile build dir, ~27s of uncached bootstrap per job before build.sh does
      # anything. The dir is content-addressed (same hash appeared in both jobs of run
      # 29185482723), so no restore-keys: a stale prefix match would just be a DIFFERENT
      # build.cs's output.
      - name: Cache Cake runfile build dir
        uses: actions/cache@v4
        with:
          path: ~/.local/share/dotnet/runfile
          key: cake-runfile-${{ runner.os }}-${{ hashFiles('build.cs', 'global.json', '.config/dotnet-tools.json') }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build + smoke on every push, but only PUSH the image when we are actually deploying.
      # `deploy` re-runs this job for the tag ref and pins prod to the tag it produces here
      # (PETBOX_IMAGE below), so images published on ordinary main pushes were never pulled
      # by anything — pure CI minutes and GHCR churn. The BUILD still earns its keep: DockerSmoke
      # boots the container, so a broken Dockerfile surfaces on main instead of mid-deploy, and
      # the GHA layer cache stays warm for the eventual deploy build.
      # The docker tag is written by the `Docker` task, not the push, so dockerTag is set either way.
      - name: Cake DockerPush (build + smoke; push only for the deploy tag)
        id: publish
        run: |
          set -euo pipefail
          chmod +x ./build.sh
          TAG_FILE="$RUNNER_TEMP/docker-tag.txt"
          # Ask for the target we actually want. DockerPush is gated by WithCriteria(dockerPush),
          # and Cake treats a REQUESTED target that its criteria skips as an ERROR ("Could not
          # reach target 'DockerPush' since it was skipped due to a criteria") — so
          # `--target=DockerPush --dockerPush=false` fails the job even though the build and
          # smoke both succeeded. DockerSmoke is the same chain minus the push.
          TARGET=DockerSmoke
          PUSH=false
          if [ "$GITHUB_REF" = "refs/tags/deploy" ]; then TARGET=DockerPush; PUSH=true; fi
          echo "Docker target: $TARGET (push=$PUSH, ref: $GITHUB_REF)"
          ./build.sh --target="$TARGET" \
            --dockerPush="$PUSH" \
            --ghcrRepository=${{ github.repository }} \
            --dockerTagOutput="$TAG_FILE" \
            --dockerCacheFrom=type=gha \
            --dockerCacheTo=type=gha,mode=max
          echo "dockerTag=$(cat "$TAG_FILE")" >> "$GITHUB_OUTPUT"

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/tags/deploy'
    needs: [publish, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Deploy files land in the deploy user's HOME (/opt/petbox is root-owned —
      # deploy can write /opt/petbox/data via the bind mount, but not the compose
      # files themselves), at /home/deploy/petbox-src/deploy/...
      - name: Copy deploy files to host
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USERNAME }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "deploy"
          target: "/home/deploy/petbox-src"

      # Secrets go through appleboy/ssh-action's `envs:` passthrough, not through
      # inline `${{ secrets.X }}` expansion inside the script body. Inline expansion
      # trips bash variable expansion on any `$` in the secret value — PBKDF2 hash
      # is literally `pbkdf2$<iter>$<salt>$<hash>`, so double-quoting substitutes
      # `$<iter>` as positional param `$1` under `set -u` and aborts the deploy.
      # env-var passthrough side-steps that.
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          PETBOX_IMAGE: ghcr.io/${{ github.repository }}:${{ needs.publish.outputs.dockerTag }}
          ADMIN_USER: ${{ secrets.PETBOX_ADMIN_USERNAME }}
          ADMIN_PASS_HASH: ${{ secrets.PETBOX_ADMIN_PASSWORD_HASH }}
          MASTER_KEY: ${{ secrets.PETBOX_MASTER_KEY }}
          OTEL_ENABLED: ${{ secrets.PETBOX_OTEL_ENABLED }}
          OTEL_ENDPOINT: ${{ secrets.PETBOX_OTEL_ENDPOINT }}
          RESTIC_PASSWORD: ${{ secrets.RESTIC_PASSWORD }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_S3_ENDPOINT: ${{ secrets.R2_S3_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          FVDS_ACCESS_KEY_ID: ${{ secrets.FVDS_ACCESS_KEY_ID }}
          FVDS_SECRET_ACCESS_KEY: ${{ secrets.FVDS_SECRET_ACCESS_KEY }}
          FVDS_S3_ENDPOINT: ${{ secrets.FVDS_S3_ENDPOINT }}
          FVDS_BUCKET: ${{ secrets.FVDS_BUCKET }}
          BACKUP_CRON: ${{ vars.BACKUP_CRON }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USERNAME }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: PETBOX_IMAGE,ADMIN_USER,ADMIN_PASS_HASH,MASTER_KEY,OTEL_ENABLED,OTEL_ENDPOINT,RESTIC_PASSWORD,R2_ACCESS_KEY_ID,R2_SECRET_ACCESS_KEY,R2_S3_ENDPOINT,R2_BUCKET,FVDS_ACCESS_KEY_ID,FVDS_SECRET_ACCESS_KEY,FVDS_S3_ENDPOINT,FVDS_BUCKET,BACKUP_CRON,TELEGRAM_BOT_TOKEN,TELEGRAM_CHAT_ID,HEALTHCHECK_URL
          script: |
            set -euo pipefail
            cd /home/deploy/petbox-src/deploy

            # Resolve OTEL_ENDPOINT "self" sentinel → container's own OTLP traces endpoint.
            # Internal API key (yb_key_system_internal, seeded by migration M004) handles auth.
            if [ "$OTEL_ENDPOINT" = "self" ]; then
              OTEL_ENDPOINT="http://localhost:8080/v1/traces"
            fi
            # compose.yaml reads ${VAR} substitutions straight from the shell env below —
            # no .env file is written to disk.
            export OTEL_ENDPOINT
            export PETBOX_IMAGE

            # Pull before up: the old container (container_name: petbox) keeps serving
            # traffic while the new image downloads. `docker rm -f petbox` here used to
            # kill the live container before the pull even started, so the downtime
            # window included the image download on top of the restart.
            docker compose pull petbox
            docker compose up -d --build

            # Post-deploy live smoke: the freshly started prod container must answer 200
            # on /health (same probe the CI image smoke uses, but against the running
            # container). Fail the deploy — with logs — if it never comes up, so a broken
            # image that boots-but-doesn't-serve is caught instead of silently "deployed".
            healthy=false
            for i in $(seq 1 30); do
              sleep 1
              if curl -fsS --max-time 2 -o /dev/null http://localhost:8083/health; then
                echo "post-deploy health OK after ${i}s"
                healthy=true
                break
              fi
            done
            if [ "$healthy" != "true" ]; then
              echo "post-deploy health check FAILED — dumping last 100 log lines"
              docker compose logs --tail 100 petbox || true
              exit 1
            fi
            docker system prune -a -f

  # ─── NuGet publish to public nuget.org on `nuget` tag push ───
  nuget-publish:
    if: github.event_name == 'push' && github.ref == 'refs/tags/nuget'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props', 'global.json') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Ensure build script is executable
        run: chmod +x ./build.sh

      - name: Publish NuGet package to nuget.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: ./build.sh --target=NuGetPush --configuration=Release

      - name: Upload NuGet artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/*.nupkg

  # ─── npm publish to public npmjs on `npm` tag push ───
  npm-publish:
    if: github.event_name == 'push' && github.ref == 'refs/tags/npm'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props', 'global.json') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Publish to public npmjs
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          chmod +x ./build.sh
          ./build.sh --target=NpmPublish

  # ─── petbox-wire (agent-wiring kit) publish to public npmjs on `npm-wire` tag push ───
  # Own tag by convention (deploy/nuget/npm/pypi are per-package channels too). The package
  # ships raw TS (no build step), but publishing now runs the kit's tests + typecheck first
  # (NpmWirePublish depends on them), and those run under bun — so this job needs bun, not
  # just node. It shipped without it and the first gated publish died on `bun: not found`.
  npm-wire-publish:
    if: github.event_name == 'push' && github.ref == 'refs/tags/npm-wire'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # The kit is raw TS run through Node's native type-stripping — `node --test src/*.ts`
      # needs Node >= 23.6 (package.json `engines`), and 20 dies with ERR_UNKNOWN_FILE_EXTENSION.
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props', 'global.json') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Publish petbox-wire to public npmjs
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          chmod +x ./build.sh
          ./build.sh --target=NpmWirePublish

  # ─── Python SDK publish to public PyPI on `pypi` tag push ───
  pypi-publish:
    if: github.event_name == 'push' && github.ref == 'refs/tags/pypi'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - uses: astral-sh/setup-uv@v5

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props', 'global.json') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Publish to public PyPI
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          chmod +x ./build.sh
          ./build.sh --target=PyPiPublish
