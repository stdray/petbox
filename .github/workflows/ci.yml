name: CI

on:
  push:
    branches: [main]
    tags: ['deploy', 'nuget', 'npm']
  pull_request:

permissions:
  contents: read
  packages: write

concurrency:
  group: ci-${{ github.ref_name }}-${{ github.sha }}
  cancel-in-progress: true

jobs:
  ci:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props', 'global.json') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Ensure build script is executable
        run: chmod +x ./build.sh

      - name: Cake CI target (format + test)
        run: ./build.sh --target=CI

  publish:
    if: github.event_name == 'push' && github.ref != 'refs/tags/nuget' && github.ref != 'refs/tags/npm'
    runs-on: ubuntu-latest
    outputs:
      dockerTag: ${{ steps.publish.outputs.dockerTag }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props', 'global.json') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cake DockerPush (build + smoke + push)
        id: publish
        run: |
          set -euo pipefail
          chmod +x ./build.sh
          TAG_FILE="$RUNNER_TEMP/docker-tag.txt"
          ./build.sh --target=DockerPush \
            --dockerPush=true \
            --ghcrRepository=${{ github.repository }} \
            --dockerTagOutput="$TAG_FILE" \
            --dockerCacheFrom=type=gha \
            --dockerCacheTo=type=gha,mode=max
          echo "dockerTag=$(cat "$TAG_FILE")" >> "$GITHUB_OUTPUT"

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/tags/deploy'
    needs: publish
    runs-on: ubuntu-latest
    steps:
      # Secrets go through appleboy/ssh-action's `envs:` passthrough, not through
      # inline `${{ secrets.X }}` expansion inside the script body. Inline expansion
      # trips bash variable expansion on any `$` in the secret value — PBKDF2 hash
      # is literally `pbkdf2$<iter>$<salt>$<hash>`, so double-quoting substitutes
      # `$<iter>` as positional param `$1` under `set -u` and aborts the deploy.
      # env-var passthrough side-steps that.
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          ADMIN_USER: ${{ secrets.YOBABOX_ADMIN_USERNAME }}
          ADMIN_PASS_HASH: ${{ secrets.YOBABOX_ADMIN_PASSWORD_HASH }}
          MASTER_KEY: ${{ secrets.YOBABOX_MASTER_KEY }}
          YOBALOG_URL: ${{ secrets.YOBALOG_SERVER_URL }}
          YOBALOG_KEY: ${{ secrets.YOBALOG_API_KEY }}
          OTEL_ENABLED: ${{ secrets.YOBABOX_OTEL_ENABLED }}
          OTLP_ENDPOINT: ${{ secrets.YOBABOX_OTLP_ENDPOINT }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USERNAME }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          envs: ADMIN_USER,ADMIN_PASS_HASH,MASTER_KEY,YOBALOG_URL,YOBALOG_KEY,OTEL_ENABLED,OTLP_ENDPOINT
          script: |
            set -euo pipefail
            IMAGE="ghcr.io/${{ github.repository }}:${{ needs.publish.outputs.dockerTag }}"
            CONTAINER_NAME="yobabox"
            # DEPLOY_USERNAME is in the `docker` group → no sudo for docker commands.
            # /opt/yobabox/data is pre-created during host bootstrap with chown 1654:1654
            # (chiseled `app` UID) so the container can write its SQLite file on mount.
            # Public GHCR package → docker pull is anonymous.
            docker pull "$IMAGE"
            docker stop "$CONTAINER_NAME" || true
            docker rm "$CONTAINER_NAME" || true
            # Host port 8082 per the shared-host convention (yobaconf=8081, yobabox=8082).
            # Only loopback bind — central Caddy terminates TLS and reverse-proxies.
            docker run -d \
              --name "$CONTAINER_NAME" \
              --restart unless-stopped \
              -p 127.0.0.1:8082:8080 \
              -v /opt/yobabox/data:/app/data \
              -e Admin__Username="$ADMIN_USER" \
              -e Admin__PasswordHash="$ADMIN_PASS_HASH" \
              -e YOBABOX_MASTER_KEY="$MASTER_KEY" \
              -e Features__Config=true \
              -e Features__Logging=true \
              -e Features__Data=true \
              -e Features__Dashboard=true \
              -e Seq__SelfLog__Enabled=true \
              -e Seq__SelfLog__ServerUrl="$YOBALOG_URL" \
              -e Seq__SelfLog__ApiKey="$YOBALOG_KEY" \
              -e OpenTelemetry__Enabled="$OTEL_ENABLED" \
              -e OpenTelemetry__OtlpEndpoint="$OTLP_ENDPOINT" \
              "$IMAGE"
            docker system prune -a -f

  # ─── NuGet publish to GitHub Packages on `nuget` tag push ───
  nuget-publish:
    if: github.event_name == 'push' && github.ref == 'refs/tags/nuget'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props', 'global.json') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Ensure build script is executable
        run: chmod +x ./build.sh

      - name: Publish NuGet package to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: ./build.sh --target=NuGetPush --configuration=Release

      - name: Upload NuGet artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/*.nupkg

  # ─── npm publish to GitHub Packages on `npm` tag push ───
  npm-publish:
    if: github.event_name == 'push' && github.ref == 'refs/tags/npm'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props', 'global.json') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Publish to GitHub Packages npm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          chmod +x ./build.sh
          ./build.sh --target=NpmPublish
