name: CI

on:
  push:
    branches: [main]
    tags: ['deploy', 'nuget', 'npm', 'pypi']

permissions:
  contents: read
  packages: write

concurrency:
  # A push to main and the `deploy` tag move land the SAME commit, firing two
  # redundant CI runs. Group both by commit so the `deploy` run cancels the
  # `main` run (deploy runs everything main does, plus the deploy job). Other
  # refs (nuget/npm/pypi tags) keep their per-ref+sha group and still cancel
  # their own stale runs.
  group: ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/tags/deploy') && format('ci-commit-{0}', github.sha) || format('ci-{0}-{1}', github.ref_name, github.sha) }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # Correctness gate. Runs in PARALLEL with `publish` (image build) — `deploy` needs
  # both — so tests and the image build no longer run back-to-back. The image build
  # may still push even if tests fail (harmless: `deploy` is gated on this job).
  # Skipped on the package-publish tags (nuget/npm/pypi), which carry no app change.
  test:
    if: github.event_name == 'push' && github.ref != 'refs/tags/nuget' && github.ref != 'refs/tags/npm' && github.ref != 'refs/tags/pypi'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props', 'global.json') }}
          restore-keys: nuget-${{ runner.os }}-

      # Cache the chromium binary Playwright downloads for the E2E suite so it isn't
      # re-fetched every run. The hosted runner already has Chrome's shared libs, so
      # the build skips `--with-deps` (the slow apt-get) via --playwrightWithDeps=false.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('Directory.Packages.props') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Ensure build script is executable
        run: chmod +x ./build.sh

      - name: Cake Test target (build + unit + E2E)
        run: ./build.sh --target=Test --playwrightWithDeps=false

  publish:
    if: github.event_name == 'push' && github.ref != 'refs/tags/nuget' && github.ref != 'refs/tags/npm' && github.ref != 'refs/tags/pypi'
    runs-on: ubuntu-latest
    outputs:
      dockerTag: ${{ steps.publish.outputs.dockerTag }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props', 'global.json') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cake DockerPush (build + smoke + push)
        id: publish
        run: |
          set -euo pipefail
          chmod +x ./build.sh
          TAG_FILE="$RUNNER_TEMP/docker-tag.txt"
          ./build.sh --target=DockerPush \
            --dockerPush=true \
            --ghcrRepository=${{ github.repository }} \
            --dockerTagOutput="$TAG_FILE" \
            --dockerCacheFrom=type=gha \
            --dockerCacheTo=type=gha,mode=max
          echo "dockerTag=$(cat "$TAG_FILE")" >> "$GITHUB_OUTPUT"

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/tags/deploy'
    needs: [publish, test]
    runs-on: ubuntu-latest
    steps:
      # Secrets go through appleboy/ssh-action's `envs:` passthrough, not through
      # inline `${{ secrets.X }}` expansion inside the script body. Inline expansion
      # trips bash variable expansion on any `$` in the secret value — PBKDF2 hash
      # is literally `pbkdf2$<iter>$<salt>$<hash>`, so double-quoting substitutes
      # `$<iter>` as positional param `$1` under `set -u` and aborts the deploy.
      # env-var passthrough side-steps that.
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          ADMIN_USER: ${{ secrets.PETBOX_ADMIN_USERNAME }}
          ADMIN_PASS_HASH: ${{ secrets.PETBOX_ADMIN_PASSWORD_HASH }}
          MASTER_KEY: ${{ secrets.PETBOX_MASTER_KEY }}
          OTEL_ENABLED: ${{ secrets.PETBOX_OTEL_ENABLED }}
          OTEL_ENDPOINT: ${{ secrets.PETBOX_OTEL_ENDPOINT }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USERNAME }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          envs: ADMIN_USER,ADMIN_PASS_HASH,MASTER_KEY,OTEL_ENABLED,OTEL_ENDPOINT
          script: |
            set -euo pipefail
            IMAGE="ghcr.io/${{ github.repository }}:${{ needs.publish.outputs.dockerTag }}"
            CONTAINER_NAME="petbox"
            # DEPLOY_USERNAME is in the `docker` group → no sudo for docker commands.
            # /opt/petbox/data is pre-created during host bootstrap with chown 1654:1654
            # (chiseled `app` UID) so the container can write its SQLite file on mount.
            # Public GHCR package → docker pull is anonymous.
            docker pull "$IMAGE"
            docker stop "$CONTAINER_NAME" || true
            docker rm "$CONTAINER_NAME" || true
            # Resolve OTEL_ENDPOINT "self" sentinel → container's own OTLP traces endpoint.
            # Internal API key (yb_key_system_internal, seeded by migration M004) handles auth.
            if [ "$OTEL_ENDPOINT" = "self" ]; then
              OTEL_ENDPOINT="http://localhost:8080/v1/traces"
            fi
            # Host port 8083 per the shared-host convention (yobaconf=8081, yobalog=8082, petbox=8083).
            # Only loopback bind — central Caddy terminates TLS and reverse-proxies.
            #
            # Self-log: in-process via SystemLogger (Phase 22.2) — writes directly through
            # IngestionPipeline. No HTTP, no API key. `Seq__SelfLog__Enabled=true` is the
            # only switch; ServerUrl/ApiKey from appsettings are ignored at runtime.
            docker run -d \
              --name "$CONTAINER_NAME" \
              --restart unless-stopped \
              -p 127.0.0.1:8083:8080 \
              -v /opt/petbox/data:/app/data \
              -e Admin__Username="$ADMIN_USER" \
              -e Admin__PasswordHash="$ADMIN_PASS_HASH" \
              -e PETBOX_MASTER_KEY="$MASTER_KEY" \
              -e Features__Config=true \
              -e Features__Logging=true \
              -e Features__Data=true \
              -e Features__Dashboard=true \
              -e Seq__SelfLog__Enabled=true \
              -e OpenTelemetry__Enabled="$OTEL_ENABLED" \
              -e OpenTelemetry__OtlpEndpoint="$OTEL_ENDPOINT" \
              "$IMAGE"

            # Post-deploy live smoke: the freshly started prod container must answer 200
            # on /health (same probe the CI image smoke uses, but against the running
            # container). Fail the deploy — with logs — if it never comes up, so a broken
            # image that boots-but-doesn't-serve is caught instead of silently "deployed".
            healthy=false
            for i in $(seq 1 30); do
              sleep 1
              if curl -fsS --max-time 2 -o /dev/null http://localhost:8083/health; then
                echo "post-deploy health OK after ${i}s"
                healthy=true
                break
              fi
            done
            if [ "$healthy" != "true" ]; then
              echo "post-deploy health check FAILED — dumping last 100 log lines"
              docker logs --tail 100 "$CONTAINER_NAME" || true
              exit 1
            fi
            docker system prune -a -f

  # ─── NuGet publish to public nuget.org on `nuget` tag push ───
  nuget-publish:
    if: github.event_name == 'push' && github.ref == 'refs/tags/nuget'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props', 'global.json') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Ensure build script is executable
        run: chmod +x ./build.sh

      - name: Publish NuGet package to nuget.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: ./build.sh --target=NuGetPush --configuration=Release

      - name: Upload NuGet artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/*.nupkg

  # ─── npm publish to public npmjs on `npm` tag push ───
  npm-publish:
    if: github.event_name == 'push' && github.ref == 'refs/tags/npm'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props', 'global.json') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Publish to public npmjs
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          chmod +x ./build.sh
          ./build.sh --target=NpmPublish

  # ─── Python SDK publish to public PyPI on `pypi` tag push ───
  pypi-publish:
    if: github.event_name == 'push' && github.ref == 'refs/tags/pypi'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - uses: astral-sh/setup-uv@v5

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props', 'global.json') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Publish to public PyPI
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          chmod +x ./build.sh
          ./build.sh --target=PyPiPublish
